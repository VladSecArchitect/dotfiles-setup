# ~/.tmux.conf
# https://github.com/mrzool/dotfiles/blob/master/tmux/.tmux.conf

###############################################################################
# General
###############################################################################

# Number windows/panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# 256-color + truecolor
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:RGB"

# Faster escape (10ms avoids vim lag; 0 can cause binding conflicts)
set -sg escape-time 10

# Let vim/editors detect focus gain/loss
set -g focus-events on

# Large scrollback
set -g history-limit 50000

# Enable mouse (click to focus, scroll, resize panes)
set -g mouse on

# Monitor activity in background windows (status bar indicator only, no flash)
setw -g monitor-activity on
set -g visual-activity off

# Keep status messages visible for 3s
set -g display-time 3000

###############################################################################
# Key bindings
###############################################################################

set -g status-keys vi
setw -g mode-keys vi

# New window/splits in current directory
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Override defaults to also preserve path
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+vim — switch panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+arrows — switch panes without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift+arrows — switch windows without prefix
bind -n S-Left  previous-window
bind -n S-Right next-window

# Resize panes (with prefix)
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# Toggle sending keystrokes to all panes in window simultaneously
bind S setw synchronize-panes

# Pass prefix through to nested tmux/SSH sessions
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

###############################################################################
# Clipboard — macOS pbcopy integration
###############################################################################

# y in copy-mode copies to system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag selection copies to system clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

###############################################################################
# Theme — Solarized Dark
###############################################################################

set -g status-style "fg=colour20,bg=colour18"
set -g window-status-current-style "fg=black,bg=white,bold"

set -g status-interval 60
set -g status-left-length 30
set -g status-left  '#[fg=green](#S) #(whoami) '
set -g status-right '#[fg=white]%H:%M#[default]'
